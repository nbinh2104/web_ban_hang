<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ Hàng | ABA Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/cart.css">
</head>
<body>
<header>
    <a href="index.html" class="logo">ABA <span>Mobile</span></a>
    <nav>
        <a href="index.html">Trang chủ</a>
        <a href="index.html#san-pham">Sản phẩm</a>
        <a href="cart.html" class="cart-icon-wrap">🛒 <span id="cart-badge"></span></a>
    </nav>
</header>
<main>
    <div class="page-title">Giỏ <span>hàng</span></div>
    <div class="page-sub" id="so-mon">0 sản phẩm</div>
    <div class="cart-table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Sản phẩm</th>
                    <th>Đơn giá</th>
                    <th>Số lượng</th>
                    <th>Thành tiền</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="danh-sach-gio"></tbody>
        </table>
    </div>
    <div class="cart-footer">
        <div class="summary-info">
            <span class="summary-label">Tổng thanh toán</span>
            <span class="summary-total" id="tong-tien">0 đ</span>
        </div>
        <div class="footer-actions">
            <a href="index.html" class="btn-back">← Tiếp tục mua</a>
            <a href="checkout.html" class="btn-checkout">Thanh toán →</a>
        </div>
    </div>
</main>
<div id="toast"></div>
<script src="js/cart.js"></script>
<script>
    hienThiGio();
    updateCartBadge();
</script>
</body>
</html>
